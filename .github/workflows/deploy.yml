# GitHub Actions 워크플로우: 코드 변경 시 자동 빌드 → GitHub Pages 배포
# 왜 변경? → Vercel 시크릿(VERCEL_ORG_ID) 설정 문제로 배포 실패가 반복되어,
#            별도 시크릿 없이 동작하는 GitHub Pages 방식으로 전환

name: CI 자동 배포

on:
  push:
    branches: [main, master]
  workflow_dispatch: # 수동 실행도 가능

# GitHub Pages 배포에 필요한 권한 설정
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지 (이전 배포가 진행 중이면 취소)
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 리포지토리 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: 빌드 실행
        run: npm run build

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v4

      - name: 빌드 결과물 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
