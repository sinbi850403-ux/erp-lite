<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" width="260" height="60" role="img" aria-label="INVEX">
  <defs>
    <linearGradient id="lg-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ddd6fe"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="lg-left" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="lg-right" x1="1" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="lg-bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <!-- Wordmark gradient -->
    <linearGradient id="lg-text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="lg-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="lg-ambient" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- ─── Icon mark (60×60) ─── -->
  <rect x="0" y="0" width="60" height="60" rx="15" fill="url(#lg-bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="30" cy="31" rx="18" ry="12" fill="#6366f1" opacity="0.2" filter="url(#lg-ambient)"/>

  <!-- Cube vertices (scaled for 60px box, centered):
       A=30,11  B=47,20  C=30,29  D=13,20
       E=47,38  F=30,47  G=13,38
  -->
  <!-- Right face -->
  <polygon points="47,20 30,29 30,47 47,38" fill="url(#lg-right)"/>
  <!-- Left face -->
  <polygon points="13,20 30,29 30,47 13,38" fill="url(#lg-left)"/>
  <!-- Top face -->
  <polygon points="30,11 47,20 30,29 13,20" fill="url(#lg-top)" filter="url(#lg-glow)"/>

  <!-- Edge highlights -->
  <line x1="30" y1="11" x2="47" y2="20" stroke="rgba(255,255,255,0.55)" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="30" y1="11" x2="13" y2="20" stroke="rgba(255,255,255,0.55)" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="30" y1="11" x2="30" y2="29" stroke="rgba(255,255,255,0.18)" stroke-width="0.7"/>
  <polyline points="13,38 30,47 47,38" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.7" stroke-linejoin="round"/>
  <line x1="13" y1="20" x2="13" y2="38" stroke="rgba(255,255,255,0.12)" stroke-width="0.7"/>
  <line x1="47" y1="20" x2="47" y2="38" stroke="rgba(255,255,255,0.08)" stroke-width="0.7"/>

  <!-- Apex dot -->
  <circle cx="30" cy="11" r="1.4" fill="rgba(255,255,255,0.75)"/>

  <!-- Icon border -->
  <rect x="1" y="1" width="58" height="58" rx="14" fill="none" stroke="rgba(139,92,246,0.35)" stroke-width="1.2"/>

  <!-- ─── Wordmark ─── -->
  <!-- INVEX in very bold, dark navy -->
  <text
    x="76"
    y="37"
    font-family="'Helvetica Neue', Helvetica, 'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="30"
    letter-spacing="1.5"
    fill="#0f172a"
  >INVEX</text>

  <!-- Tagline -->
  <text
    x="77"
    y="51"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="500"
    font-size="9.5"
    letter-spacing="3.5"
    fill="#6366f1"
  >INVENTORY ERP</text>

  <!-- Vertical separator between icon and text -->
  <line x1="68" y1="14" x2="68" y2="46" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
</svg>
