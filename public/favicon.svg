<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" role="img" aria-label="INVEX">
  <defs>
    <linearGradient id="fav-top" x1="18" y1="14" x2="62" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ddd6fe"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="fav-left" x1="18" y1="25" x2="40" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="fav-right" x1="62" y1="25" x2="40" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="fav-bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <filter id="fav-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fav-ambient" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="80" height="80" rx="20" fill="url(#fav-bg)"/>
  <ellipse cx="40" cy="40" rx="24" ry="16" fill="#6366f1" opacity="0.18" filter="url(#fav-ambient)"/>

  <!-- Right face (shadow) -->
  <polygon points="62,25 40,36 40,58 62,47" fill="url(#fav-right)"/>
  <!-- Left face -->
  <polygon points="18,25 40,36 40,58 18,47" fill="url(#fav-left)"/>
  <!-- Top face -->
  <polygon points="40,14 62,25 40,36 18,25" fill="url(#fav-top)" filter="url(#fav-glow)"/>

  <line x1="40" y1="14" x2="62" y2="25" stroke="rgba(255,255,255,0.55)" stroke-width="1" stroke-linecap="round"/>
  <line x1="40" y1="14" x2="18" y2="25" stroke="rgba(255,255,255,0.55)" stroke-width="1" stroke-linecap="round"/>
  <line x1="40" y1="14" x2="40" y2="36" stroke="rgba(255,255,255,0.20)" stroke-width="0.75"/>
  <polyline points="18,47 40,58 62,47" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.75" stroke-linejoin="round"/>
  <line x1="18" y1="25" x2="18" y2="47" stroke="rgba(255,255,255,0.12)" stroke-width="0.75"/>
  <line x1="62" y1="25" x2="62" y2="47" stroke="rgba(255,255,255,0.08)" stroke-width="0.75"/>

  <circle cx="40" cy="14" r="1.8" fill="rgba(255,255,255,0.75)"/>
  <rect x="1.5" y="1.5" width="77" height="77" rx="18.5" fill="none" stroke="rgba(139,92,246,0.35)" stroke-width="1.5"/>
</svg>
